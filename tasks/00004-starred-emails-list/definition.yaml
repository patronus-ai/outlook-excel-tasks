id: 00004-marketing-campaign-record
start_url: http://cua_email.web
prompt: |
  You're keeping a small log of documents people have sent you.

  Open the email app at http://cua_email.web and sign in as user_0001. Find the message from Jessica Martinez with the subject "Marketing Campaign Proposal" — searching the inbox for the sender is the quickest way to find it. The sender and subject show in the inbox row, so there's no need to open it, and leave the emails untouched.

  Then switch to the spreadsheet at http://cua_spreadsheet.web (the "Book 1" workbook is already open) and record it as a two-column table. Down column A put the labels Sender, Subject, Folder, Topic and DocType; in column B the matching values — Jessica Martinez, the subject of that email, the folder Inbox, the first word of the subject (Marketing), and the last word of the subject, which is the document type (Proposal).

  Fill it in one go: click A1 and type all the rows as a single block, with a Tab between the two columns and Enter after each row. Then check the result — if any cell came out empty, click that exact cell and type only its value. Don't use Enter to move from one cell to the next when fixing things, because that shifts the rows down and mislays the last value.
available_tools:
- browser_*
rewards:
- name: Took screenshot
  kind: action
  weight: 0.05
  tool: browser_screenshot
- name: A1+B1="Jessica Martinez"
  kind: state
  weight: 0.2
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=0 AND col_index=0 AND raw_value='Sender' THEN 1 ELSE 0 END) AS a1,\n  SUM(CASE\
      \ WHEN row_index=0 AND col_index=1 AND raw_value='Jessica Martinez' THEN 1 ELSE 0 END) AS b1\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a1
    path: $[0].a1
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b1
    path: $[0].b1
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A2+B2 ~Marketing
  kind: state
  weight: 0.2
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=1 AND col_index=0 AND raw_value='Subject' THEN 1 ELSE 0 END) AS a2,\n  SUM(CASE\
      \ WHEN row_index=1 AND col_index=1 AND raw_value LIKE '%Marketing%' THEN 1 ELSE 0 END) AS b2\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a2
    path: $[0].a2
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b2
    path: $[0].b2
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A3+B3="Inbox"
  kind: state
  weight: 0.15
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=2 AND col_index=0 AND raw_value='Folder' THEN 1 ELSE 0 END) AS a3,\n  SUM(CASE\
      \ WHEN row_index=2 AND col_index=1 AND raw_value='Inbox' THEN 1 ELSE 0 END) AS b3\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a3
    path: $[0].a3
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b3
    path: $[0].b3
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A4+B4="Marketing"
  kind: state
  weight: 0.175
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=3 AND col_index=0 AND raw_value='Topic' THEN 1 ELSE 0 END) AS a4,\n  SUM(CASE\
      \ WHEN row_index=3 AND col_index=1 AND LOWER(TRIM(raw_value))='marketing' THEN 1 ELSE 0 END) AS b4\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a4
    path: $[0].a4
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b4
    path: $[0].b4
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A5+B5="Proposal"
  kind: state
  weight: 0.175
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=4 AND col_index=0 AND raw_value='DocType' THEN 1 ELSE 0 END) AS a5,\n  SUM(CASE\
      \ WHEN row_index=4 AND col_index=1 AND LOWER(TRIM(raw_value))='proposal' THEN 1 ELSE 0 END) AS b5\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a5
    path: $[0].a5
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b5
    path: $[0].b5
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: Jessica's email unchanged
  kind: state
  weight: 0.05
  source:
    query: SELECT folderId FROM emails WHERE userId='user_0001' AND fromName='Jessica Martinez' AND subject='Marketing Campaign
      Proposal'
    db_path: /opt/patronus-gym/apps/cua_email/src/db/seed.sqlite
  assertions:
  - name: still_in_inbox
    path: $[0].folderId
    operator: STRING_EQUALS
    expected: folder_inbox_user_0001
metadata:
  environment: outlook-excel
  difficulty: medium
