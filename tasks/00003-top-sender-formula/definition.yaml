id: 00003-design-review-record
start_url: http://cua_email.web
prompt: |
  You're noting down a meeting from your inbox in a spreadsheet.

  Open the email app at http://cua_email.web and sign in as user_0001. Find the message from Michael Chen about the design review meeting (subject "Design Review Meeting - February") — searching the inbox for the sender is the fastest way to find it. You can read the sender and subject from the inbox row without opening it, and please don't change any emails.

  Then switch to the spreadsheet at http://cua_spreadsheet.web (the "Book 1" workbook is already open) and record it as a two-column table. Down column A put the labels Sender, Subject, Folder, Month and Topic; in column B the matching values — Michael Chen, the full subject exactly ("Design Review Meeting - February"), the folder Inbox, the month named in the subject (February), and the first word of the subject (Design).

  The quickest way to fill it in is to click A1 and type the whole table in one go, tabbing between the columns and pressing Enter at the end of each row, rather than editing the cells individually.
available_tools:
- browser_*
rewards:
- name: Took screenshot
  kind: action
  weight: 0.05
  tool: browser_screenshot
- name: A1="Sender" + B1="Michael Chen"
  kind: state
  weight: 0.25
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=0 AND col_index=0 AND raw_value='Sender'       THEN 1 ELSE 0 END) AS a1,\n \
      \ SUM(CASE WHEN row_index=0 AND col_index=1 AND raw_value='Michael Chen' THEN 1 ELSE 0 END) AS b1\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a1
    path: $[0].a1
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b1
    path: $[0].b1
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A2+B2 exact subject
  kind: state
  weight: 0.25
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=1 AND col_index=0 AND raw_value='Subject' THEN 1 ELSE 0 END) AS a2,\n  SUM(CASE\
      \ WHEN row_index=1 AND col_index=1 AND raw_value='Design Review Meeting - February' THEN 1 ELSE 0 END) AS b2\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a2
    path: $[0].a2
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b2
    path: $[0].b2
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A3="Folder" + B3="Inbox"
  kind: state
  weight: 0.2
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=2 AND col_index=0 AND raw_value='Folder' THEN 1 ELSE 0 END) AS a3,\n  SUM(CASE\
      \ WHEN row_index=2 AND col_index=1 AND raw_value='Inbox'  THEN 1 ELSE 0 END) AS b3\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a3
    path: $[0].a3
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b3
    path: $[0].b3
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A4="Month" + B4="February"
  kind: state
  weight: 0.2
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=3 AND col_index=0 AND raw_value='Month'    THEN 1 ELSE 0 END) AS a4,\n  SUM(CASE\
      \ WHEN row_index=3 AND col_index=1 AND raw_value='February' THEN 1 ELSE 0 END) AS b4\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a4
    path: $[0].a4
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b4
    path: $[0].b4
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A5="Topic" + B5="Design"
  kind: state
  weight: 0.15
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=4 AND col_index=0 AND raw_value='Topic' THEN 1 ELSE 0 END) AS a5,\n  SUM(CASE\
      \ WHEN row_index=4 AND col_index=1 AND LOWER(TRIM(raw_value))='design' THEN 1 ELSE 0 END) AS b5\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a5
    path: $[0].a5
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b5
    path: $[0].b5
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: Michael's email unchanged
  kind: state
  weight: 0.05
  source:
    query: SELECT folderId FROM emails WHERE userId='user_0001' AND fromName='Michael Chen' AND subject='Design Review Meeting
      - February'
    db_path: /opt/patronus-gym/apps/cua_email/src/db/seed.sqlite
  assertions:
  - name: still_in_inbox
    path: $[0].folderId
    operator: STRING_EQUALS
    expected: folder_inbox_user_0001
metadata:
  environment: outlook-excel
  difficulty: medium
