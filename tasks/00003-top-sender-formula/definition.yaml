id: 00003-design-review-record
start_url: http://cua_email.web
prompt: "Two-app task: find a specific email in the inbox and record its\nmetadata in the spreadsheet.\n\nStep 1 — Email login:\n\
  Navigate to http://cua_email.web and log in as \"user_0001\"\n(single User ID input, then \"Create Session\").\n\nStep 2\
  \ — Find the email:\nIn the Inbox folder, locate the email from \"Michael Chen\" with\nthe subject \"Design Review Meeting\
  \ - February\". The sender and\nsubject are visible directly in the inbox row — do NOT open the\nbody.\n\nStep 3 — Record\
  \ in spreadsheet:\nNavigate to http://cua_spreadsheet.web and enter:\n\n- A1: \"Sender\"   B1: \"Michael Chen\"\n- A2: \"\
  Subject\"  B2: the subject text of that email\n- A3: \"Folder\"   B3: \"Inbox\"\n- A4: \"Month\"    B4: the month mentioned\
  \ in the subject (one\n                     word, e.g. the month of the meeting)\n\nConstraints:\n- A1-A4 labels exactly\
  \ as shown.\n- B1 = \"Michael Chen\" exactly. B3 = \"Inbox\" exactly.\n- B4 is the single month word from the subject.\n\
  - Do not modify any emails.\n- Do NOT navigate to /docs, /api/, /openapi, /swagger.\n\n  Efficiency tips (you have limited\
  \ steps — be fast):\n  - Find the email fast: use the inbox Search box (magnifier icon at the\n    top), type the sender's\
  \ name, open the matching row. Don't scroll.\n  - Fill ALL spreadsheet cells in ONE action: click cell A1 once, then\n \
  \   type the whole 2-column table as a single block using a Tab between\n    the two columns and Enter at the end of each\
  \ row. Example of a single\n    typed value: \"Sender<TAB>...<ENTER>Subject<TAB>...<ENTER>...\" — this\n    populates A1,B1,A2,B2,...\
  \ in one go. This is far faster and more\n    reliable than editing cells one at a time.\n"
available_tools:
- browser_*
rewards:
- name: Took screenshot
  kind: action
  weight: 0.05
  tool: browser_screenshot
- name: A1="Sender" + B1="Michael Chen"
  kind: state
  weight: 0.25
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=0 AND col_index=0 AND raw_value='Sender'       THEN 1 ELSE 0 END) AS a1,\n \
      \ SUM(CASE WHEN row_index=0 AND col_index=1 AND raw_value='Michael Chen' THEN 1 ELSE 0 END) AS b1\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a1
    path: $[0].a1
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b1
    path: $[0].b1
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A2="Subject" + B2 contains "Design Review"
  kind: state
  weight: 0.25
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=1 AND col_index=0 AND raw_value='Subject' THEN 1 ELSE 0 END) AS a2,\n  SUM(CASE\
      \ WHEN row_index=1 AND col_index=1 AND raw_value LIKE '%Design Review%' THEN 1 ELSE 0 END) AS b2\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a2
    path: $[0].a2
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b2
    path: $[0].b2
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A3="Folder" + B3="Inbox"
  kind: state
  weight: 0.2
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=2 AND col_index=0 AND raw_value='Folder' THEN 1 ELSE 0 END) AS a3,\n  SUM(CASE\
      \ WHEN row_index=2 AND col_index=1 AND raw_value='Inbox'  THEN 1 ELSE 0 END) AS b3\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a3
    path: $[0].a3
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b3
    path: $[0].b3
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A4="Month" + B4="February"
  kind: state
  weight: 0.2
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=3 AND col_index=0 AND raw_value='Month'    THEN 1 ELSE 0 END) AS a4,\n  SUM(CASE\
      \ WHEN row_index=3 AND col_index=1 AND raw_value='February' THEN 1 ELSE 0 END) AS b4\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a4
    path: $[0].a4
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b4
    path: $[0].b4
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: Michael's email unchanged
  kind: state
  weight: 0.05
  source:
    query: SELECT folderId FROM emails WHERE userId='user_0001' AND fromName='Michael Chen' AND subject='Design Review Meeting
      - February'
    db_path: /opt/patronus-gym/apps/cua_email/src/db/seed.sqlite
  assertions:
  - name: still_in_inbox
    path: $[0].folderId
    operator: STRING_EQUALS
    expected: folder_inbox_user_0001
metadata:
  environment: outlook-excel
  difficulty: medium
