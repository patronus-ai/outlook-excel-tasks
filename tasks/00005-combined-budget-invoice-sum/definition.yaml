id: 00005-combined-budget-invoice-sum
start_url: "http://cua_email.web"
prompt: |
  You have two apps available:
  - Outlook-style email at http://cua_email.web (active session: user_0001)
  - Excel-style spreadsheet at http://cua_spreadsheet.web (blank workbook)

  Read TWO emails from the Inbox:
  1. "Budget Proposal - Q2" — note the Total amount.
  2. "Invoice #2024-001" from Vendor Billing — note the Amount due.

  Combine both numbers in the spreadsheet, using a SUM formula:

  - A1: "Budget total",  B1: the budget total amount (just the number)
  - A2: "Invoice amount", B2: the invoice amount (just the number)
  - A3: "Combined",       B3: a SUM formula referencing B1 and B2
    (e.g. =SUM(B1:B2) or =B1+B2)

  B3 must be a formula — not a typed number. Do not modify either
  email. Do not add cells beyond A1:B3.

available_tools:
  - browser_*

rewards:
  - name: "Took screenshot"
    kind: action
    weight: 0.05
    tool: browser_screenshot

  - name: "B1 is budget total 405000"
    kind: state
    weight: 0.20
    source:
      type: diff
      url: "http://cua_spreadsheet.web/api/state"
      method: GET
    assertions:
      - name: B1_budget
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "B1"
              after:
                computedValue: 405000

  - name: "B2 is invoice amount 1250"
    kind: state
    weight: 0.20
    source:
      type: diff
      url: "http://cua_spreadsheet.web/api/state"
      method: GET
    assertions:
      - name: B2_invoice
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "B2"
              after:
                computedValue: 1250

  - name: "B3 uses formula and equals 406250"
    kind: state
    weight: 0.30
    source:
      type: diff
      url: "http://cua_spreadsheet.web/api/state"
      method: GET
    assertions:
      - name: B3_formula_result
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "B3"
              after:
                computedValue: 406250

  - name: "Labels in column A"
    kind: state
    weight: 0.15
    source:
      type: diff
      url: "http://cua_spreadsheet.web/api/state"
      method: GET
    assertions:
      - name: A1_label
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "A1"
              after:
                value: "Budget total"
      - name: A2_label
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "A2"
              after:
                value: "Invoice amount"
      - name: A3_label
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "A3"
              after:
                value: "Combined"

  - name: "Both source emails unchanged in inbox"
    kind: state
    weight: 0.10
    source:
      query: "SELECT COUNT(*) AS n FROM emails WHERE userId='user_0001' AND subject IN ('Budget Proposal - Q2', 'Invoice #2024-001') AND folderId='folder_inbox_user_0001'"
    assertions:
      - name: both_emails_in_inbox
        path: "$[0].n"
        operator: NUMERIC_MATCH
        expected: "== 2"

metadata:
  environment: outlook-excel
  difficulty: hard
