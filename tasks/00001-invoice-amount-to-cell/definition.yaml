id: 00001-invoice-amount-to-cell
start_url: "http://cua_email.web"
prompt: |
  You have two apps available:
  - Outlook-style email at http://cua_email.web (active session: user_0001)
  - Excel-style spreadsheet at http://cua_spreadsheet.web (blank workbook)

  Vendor Billing sent an invoice with subject "Invoice #2024-001".
  Open that email and extract FIVE pieces of information from the
  body, then record them in the spreadsheet exactly as shown:

  - A1: "Invoice #2024-001"
  - A2: "Amount",   B2: the numeric amount due (just the number, no $)
  - A3: "Due date", B3: due date in ISO format YYYY-MM-DD
  - A4: "Period",   B4: the service period text exactly as written
                    in the body (e.g. "January 2024")
  - A5: "From",     B5: the signature name at the end of the email
                    body — NOT the From: header in the email client

  Important constraints:
  - B3 must be ISO format YYYY-MM-DD (e.g. "2024-02-15"), not
    "February 15, 2024" or any other format.
  - B5 must be the signature name from the body, not the sender
    name shown in the email list.
  - Do not modify the email (no archive, delete, star, etc.).
  - Do not add any cells beyond A1:B5.

available_tools:
  - browser_*

rewards:
  - name: "Took screenshot"
    kind: action
    weight: 0.05
    tool: browser_screenshot

  - name: "A1 label is invoice number"
    kind: state
    weight: 0.10
    source:
      type: diff
      url: "http://cua_spreadsheet.web/api/state"
      method: GET
    assertions:
      - name: A1_invoice_label
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "A1"
              after:
                value: "Invoice #2024-001"

  - name: "B2 is amount 1250"
    kind: state
    weight: 0.20
    source:
      type: diff
      url: "http://cua_spreadsheet.web/api/state"
      method: GET
    assertions:
      - name: B2_amount
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "B2"
              after:
                computedValue: 1250

  - name: "B3 due date in ISO format"
    kind: state
    weight: 0.20
    source:
      type: diff
      url: "http://cua_spreadsheet.web/api/state"
      method: GET
    assertions:
      - name: B3_iso_date
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "B3"
              after:
                value: "2024-02-15"

  - name: "B4 period exact text"
    kind: state
    weight: 0.15
    source:
      type: diff
      url: "http://cua_spreadsheet.web/api/state"
      method: GET
    assertions:
      - name: B4_period
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "B4"
              after:
                value: "January 2024"

  - name: "B5 signature name (not From header)"
    kind: state
    weight: 0.15
    source:
      type: diff
      url: "http://cua_spreadsheet.web/api/state"
      method: GET
    assertions:
      - name: B5_signature
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "B5"
              after:
                value: "Accounts Receivable"

  - name: "Column A row labels"
    kind: state
    weight: 0.10
    source:
      type: diff
      url: "http://cua_spreadsheet.web/api/state"
      method: GET
    assertions:
      - name: A2_label
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "A2"
              after:
                value: "Amount"
      - name: A3_label
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "A3"
              after:
                value: "Due date"
      - name: A4_label
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "A4"
              after:
                value: "Period"
      - name: A5_label
        operator: JSON_CONTAINS
        expected:
          deltas:
            - operation: "add"
              entity_type: "cell"
              entity_id: "A5"
              after:
                value: "From"

  - name: "Email unchanged in Inbox"
    kind: state
    weight: 0.05
    source:
      query: "SELECT folderId, isStarred, isFlagged FROM emails WHERE userId='user_0001' AND fromName='Vendor Billing' AND subject='Invoice #2024-001'"
    assertions:
      - name: still_in_inbox
        path: "$[0].folderId"
        operator: STRING_EQUALS
        expected: "folder_inbox_user_0001"
      - name: not_starred
        path: "$[0].isStarred"
        operator: NUMERIC_MATCH
        expected: "== 0"

metadata:
  environment: outlook-excel
  difficulty: hard
