id: 00001-newest-invoice-record
start_url: http://cua_email.web
prompt: |
  You're keeping a small log of incoming invoices in a spreadsheet.

  Open the email app at http://cua_email.web and sign in as user_0001 (enter the user id and create the session). Find the invoice from Vendor Billing with the subject "Invoice #2024-001" — searching the inbox for the sender is the quickest way to find it. You can read everything you need straight from the inbox row, so there's no need to open the message, and please leave the emails untouched.

  Then switch to the spreadsheet at http://cua_spreadsheet.web (the "Book 1" workbook is already open) and record the invoice as a two-column table. Down column A put the labels Sender, Subject, Folder, Year and Invoice no; in column B put the matching values — Vendor Billing, the subject "Invoice #2024-001", the folder Inbox, the year taken from the invoice number (2024), and the part after the # (2024-001). Match the text exactly.

  The quickest way to fill it in is to click A1 and type the whole table in one go, tabbing between the two columns and pressing Enter at the end of each row, rather than editing the cells one by one.
available_tools:
- browser_*
rewards:
- name: Took screenshot
  kind: action
  weight: 0.05
  tool: browser_screenshot
- name: A1 label "Sender"
  kind: state
  weight: 0.1
  source:
    query: SELECT COUNT(*) AS n FROM cells WHERE row_index=0 AND col_index=0 AND raw_value='Sender'
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a1
    path: $[0].n
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: B1 sender "Vendor Billing"
  kind: state
  weight: 0.25
  source:
    query: SELECT COUNT(*) AS n FROM cells WHERE row_index=0 AND col_index=1 AND raw_value='Vendor Billing'
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: b1
    path: $[0].n
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A2 label "Subject"
  kind: state
  weight: 0.1
  source:
    query: SELECT COUNT(*) AS n FROM cells WHERE row_index=1 AND col_index=0 AND raw_value='Subject'
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a2
    path: $[0].n
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: B2 subject "Invoice
  kind: state
  weight: 0.25
  source:
    query: 'SELECT COUNT(*) AS n FROM cells WHERE row_index=1 AND col_index=1 AND raw_value=''Invoice #2024-001'''
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: b2
    path: $[0].n
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A3 label "Folder" + B3 "Inbox"
  kind: state
  weight: 0.2
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=2 AND col_index=0 AND raw_value='Folder' THEN 1 ELSE 0 END) AS a3,\n  SUM(CASE\
      \ WHEN row_index=2 AND col_index=1 AND raw_value='Inbox' THEN 1 ELSE 0 END) AS b3\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a3
    path: $[0].a3
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b3
    path: $[0].b3
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A4="Year" + B4=2024
  kind: state
  weight: 0.1
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=3 AND col_index=0 AND raw_value='Year' THEN 1 ELSE 0 END) AS a4,\n  SUM(CASE\
      \ WHEN row_index=3 AND col_index=1 AND (raw_value='2024' OR computed_value='2024') THEN 1 ELSE 0 END) AS b4\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a4
    path: $[0].a4
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b4
    path: $[0].b4
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: A5="Invoice no" + B5="2024-001"
  kind: state
  weight: 0.15
  source:
    query: "SELECT\n  SUM(CASE WHEN row_index=4 AND col_index=0 AND raw_value='Invoice no' THEN 1 ELSE 0 END) AS a5,\n  SUM(CASE\
      \ WHEN row_index=4 AND col_index=1 AND raw_value='2024-001' THEN 1 ELSE 0 END) AS b5\nFROM cells\n"
    db_path: /opt/patronus-gym/apps/cua_spreadsheet/src/db/local.db
  assertions:
  - name: a5
    path: $[0].a5
    operator: NUMERIC_MATCH
    expected: '>= 1'
  - name: b5
    path: $[0].b5
    operator: NUMERIC_MATCH
    expected: '>= 1'
- name: Invoice email unchanged
  kind: state
  weight: 0.05
  source:
    query: 'SELECT folderId FROM emails WHERE userId=''user_0001'' AND fromName=''Vendor Billing'' AND subject=''Invoice #2024-001'''
    db_path: /opt/patronus-gym/apps/cua_email/src/db/seed.sqlite
  assertions:
  - name: still_in_inbox
    path: $[0].folderId
    operator: STRING_EQUALS
    expected: folder_inbox_user_0001
metadata:
  environment: outlook-excel
  difficulty: medium
